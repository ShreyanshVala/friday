<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let num = 1729;
      let original = num;

      let sum = 0;
      while (num > 0) {
        let r = num % 10;
        sum += r;
        num = Math.floor(num / 10);
      }

      let temp = sum;
      let rev = 0;

      while (temp > 0) {
        let r = temp % 10;
        rev = rev * 10 + r;
        temp = Math.floor(temp / 10);
      }

      let result = sum * rev;

      document.write("Original: " + original);
      document.write("<br>Sum: " + sum);
      document.write("<br>Reverse: " + rev);
      document.write("<br>Multiply: " + result);

      if (result === original) {
        document.write("<br>Magic No");
      } else {
        document.write("<br> Not a Magic No");
      }
    </script>
  </body>
</html>
