<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Relational Operator- <,>,<=,>=,==,!=,===,!==
      let a = 40;
      let b = "40";
      document.write("<br> a > b", a > b);
      document.write("<br> a < b", a < b);
      document.write("<br> a >= b", a >= b);
      document.write("<br> a <= b", a <= b);
      document.write("<br> a == b ", a == b); //check only value
      document.write("<br> a !=  ", a != b);
      document.write("<br> a === b     ", a === b); //check value and datatype
      document.write("<br> a !==b ", a !== b);
    </script>
  </body>
</html>
