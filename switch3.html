<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //vovel or concurrent
      //case sensitive
      let ch = "i";
      switch (ch) {
        case "A":
        case "E":
        case "I":
        case "O":
        case "U":
        case "a":
        case "e":
        case "i":
        case "o":
        case "u":
          document.write("<br>Vovel");
          break;
        default:
          document.write("<br>Consonant");
          break;
      }
    </script>
  </body>
</html>
