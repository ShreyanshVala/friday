<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //--
      let i = 1; //entry controlled loop
      while (i <= 5) {
        document.write("<br>", i);
        i++; //i+1 2
      }

      document.write("<hr>");

      let j = 10;
      do {
        //exit control loop
        document.write("<br>" + j);
        j += 2;
      } while (j <= 20); //10<=20

      document.write("<hr>");
      //entry controlled loop
      for (let i = 1; i <= 5; i++) {
        document.write("<br>", i);
      }
    </script>
  </body>
</html>
