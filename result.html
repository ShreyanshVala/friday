<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let no = 20;
      if (no % 3 == 0 && no % 5 == 0) {
        document.write("<br> Number is divisible by both 3 and 5");
      } else {
        document.write("<br> Not divisible by both 3 and 5");
      }

      //   document.write("<br>no 3&  & no 5 ", no / 3 && no / 5);

      let m1 = 8;
      let m2 = 87;
      let m3 = 45;
      total = m1 + m2 + m3;
      document.write("<br>Total is :", total);
      per = total / 3;
      document.write("<br>Percentage is :", per);
      if (per >= 80) {
        document.write("<br>Grade A+");
      } else if (per >= 70) {
        document.write("<br>Grade A");
      } else if (per >= 60) {
        document.write("<br>Grade B");
      } else if (per >= 50) {
        document.write("<br>Grade C");
      } else if (per >= 40) {
        document.write("<br>Pass");
      } else {
        document.write("<br>Fail");
      }
    </script>
  </body>
</html>
