<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // logical operator = &&(and), ||(or) , !(Not)
      let a = 35;
      let b = 30;
      let c = 200;
      document.write("<br>a>b && a>c is =", a > b && a > c);
      document.write("<br>a>b || a>c is ", a > b || a > c);
      document.write("<br> !a>b || a>c is", !a > b || a > c);

      //ternory operator = ? :
      // (condition) ? true block : false block
      document.write(a > b ? "<br>A is maximum" : "<br> B is maximum");
      let age = 17;
      document.write(
        age >= 18
          ? "<br>You are elligible for vote"
          : "<br>You are not elligible for vote",
      );
      // let no = 8;
      // document.write(no % 2 == 0 ? "<br>No is Even" : "<br>no is Odd");

      let no = 23;
      document.write(no % 2 == 0 ? "<br> no is even" : "<br>no is odd");
    </script>
  </body>
</html>
