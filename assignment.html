<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //shorthand operator +=,-=,*=,/=,%=,**=
      let a = 10;
      document.write("<br>A is ", a);
      a += 5;
      document.write("<br> A is :", a);
      a -= 2;
      document.write("<br> A is :", a);
      a *= 4;
      document.write("<br> A is :", a);
      //   a **= 2;
      //   document.write("<br> A is :", a);
      a /= 2;
      document.write("<br> A is :", a);
      a %= 4;
      document.write("<br> A is :", a);

      //types  of operator
      document.write("<br>Numeric value:", typeof 456);
      document.write("<br>Numeric value:", typeof 456.666);
      document.write("<br>Character value:", typeof "R");
      document.write("<br>String value:", typeof "gghghggg");
      document.write("<br>Boolean value:", typeof true);
      document.write("<br>Boolean value:", typeof false);
      let x;
      document.write("<br>X value is :", x);
      document.write("<br>Array value:", typeof []);
      document.write("<br>Object value:", typeof {});
    </script>
  </body>
</html>
